# Africandrosera gallery image host — Netlify proxy to Pi Flask API.
# Deploy as site name "africandrosera" → https://africandrosera.netlify.app

[build]
  publish = "public"
  command = "echo 'africandrosera-media-proxy: static publish only'"

[[redirects]]
  from = "/api/gallery/files/*"
  to = "https://canopyserver.alurellc.com/api/gallery/files/:splat"
  status = 200
  force = true

# NOTE: [[headers]] below do NOT apply to proxied responses (Netlify docs).
# Edge cache is driven by Cache-Control from gallery_app on the Pi — see
# gallery-backend gallery_routes.py (GALLERY_FILE_CACHE_CONTROL).
[[headers]]
  for = "/api/gallery/files/*"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=604800"
